<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AXIOM Face v2</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; }
  canvas { display: block; image-rendering: pixelated; }
  #label {
    position: fixed; left: 12px; bottom: 10px;
    font: 11px/1.2 "JetBrains Mono", monospace;
    color: rgba(255,255,255,0.35);
    pointer-events: none;
    white-space: nowrap;
  }
</style>
</head>
<body>
<canvas id="face"></canvas>
<div id="label"></div>
<style>
  #sense-panel {
    position: fixed; top: 12px; right: 12px;
    font: 11px/1.2 "JetBrains Mono", monospace;
    color: #e7e9ef;
    background: rgba(15,15,25,0.92);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 11px;
    overflow: hidden;
    transition: width 150ms ease, height 150ms ease;
    width: 22px; height: 22px;
    z-index: 10;
  }
  #sense-panel.open { width: 180px; height: 128px; }
  #sense-pill { width:22px; height:22px; display:flex; align-items:center; justify-content:center;
    cursor:pointer; letter-spacing:1px; opacity:0.35; user-select:none; }
  #sense-pill:hover { opacity:0.85; }
  #sense-panel.open #sense-pill { display: none; }
  #sense-card { display:none; padding:8px 10px; width:180px; }
  #sense-panel.open #sense-card { display:block; }
  #sense-card header { display:flex; justify-content:space-between; opacity:0.5; font-size:10px; margin-bottom:6px; letter-spacing:1px; }
  #sense-card header button { background:none; border:0; color:inherit; cursor:pointer; font:inherit; }
  .sense-row { display:flex; align-items:center; justify-content:space-between; padding:6px 0; cursor:pointer; border-radius:6px; }
  .sense-row:hover { background: rgba(255,255,255,0.04); }
  .sense-row.flash { background: rgba(120,220,255,0.18); }
  .sense-row .lbl { display:flex; align-items:center; gap:8px; }
  .sense-row .glyph { opacity:0.55; width:10px; text-align:center; }
  .switch { width:36px; height:18px; background:rgba(255,255,255,0.12); border-radius:9px; position:relative; transition:background 120ms; border:0; padding:0; }
  .switch::after { content:""; position:absolute; top:2px; left:2px; width:14px; height:14px; border-radius:50%; background:rgba(255,255,255,0.45); transition:left 120ms, background 120ms; }
  .sense-row.on .switch { background:rgba(0,212,255,0.7); }
  .sense-row.on .switch::after { left:20px; background:rgb(200,255,255); }
  #sense-foot { margin-top:4px; opacity:0.4; font-size:10px; }
</style>
<div id="sense-panel" role="group" aria-label="Sense controls">
  <div id="sense-pill" tabindex="0" title="E=eyes A=ears V=voice P=panel" aria-label="Sense controls (collapsed). Press to expand.">&middot;&middot;&middot;</div>
  <div id="sense-card">
    <header><span>SENSES</span><button id="sense-close" aria-label="Close">x</button></header>
    <div class="sense-row on" data-sense="eyes"><span class="lbl"><span class="glyph">O</span>EYES</span><button role="switch" aria-checked="true" class="switch" aria-label="Toggle eyes"></button></div>
    <div class="sense-row on" data-sense="ears"><span class="lbl"><span class="glyph">)</span>EARS</span><button role="switch" aria-checked="true" class="switch" aria-label="Toggle ears"></button></div>
    <div class="sense-row on" data-sense="voice"><span class="lbl"><span class="glyph">~</span>VOICE</span><button role="switch" aria-checked="true" class="switch" aria-label="Toggle voice"></button></div>
    <div class="sense-row on" data-sense="voice_elevenlabs"><span class="lbl"><span class="glyph">L</span>EL VOICE</span><button role="switch" aria-checked="true" class="switch" aria-label="Toggle ElevenLabs voice"></button></div>
    <div id="sense-foot">not saved yet</div>
  </div>
</div>
<script>
(function(){
  const LS_KEY = "axiom.senses";
  const ENDPOINT = "http://127.0.0.1:7899/senses";
  const panel = document.getElementById("sense-panel");
  const pill = document.getElementById("sense-pill");
  const closeBtn = document.getElementById("sense-close");
  const foot = document.getElementById("sense-foot");
  let senses = { eyes:true, ears:true, voice:true, voice_elevenlabs:true };
  try { Object.assign(senses, JSON.parse(localStorage.getItem(LS_KEY) || "{}")); } catch(e){}
  function render() {
    for (const k of ["eyes","ears","voice","voice_elevenlabs"]) {
      const row = document.querySelector(`.sense-row[data-sense="${k}"]`);
      row.classList.toggle("on", !!senses[k]);
      row.querySelector(".switch").setAttribute("aria-checked", senses[k] ? "true" : "false");
    }
    pill.title = `E=${senses.eyes?"ON":"OFF"} A=${senses.ears?"ON":"OFF"} V=${senses.voice?"ON":"OFF"} L=${senses.voice_elevenlabs?"ON":"OFF"}`;
  }
  async function save() {
    const payload = Object.assign({schema_version:1, updated_by:"web-face", updated_at:new Date().toISOString()}, senses);
    localStorage.setItem(LS_KEY, JSON.stringify(senses));
    foot.textContent = "saving...";
    try {
      await fetch(ENDPOINT, {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(payload)});
      foot.textContent = "saved " + new Date().toLocaleTimeString();
    } catch(e) { foot.textContent = "offline - cached locally"; }
  }
  function toggle(k) {
    senses[k] = !senses[k]; render(); save();
    const row = document.querySelector(`.sense-row[data-sense="${k}"]`);
    row.classList.add("flash"); setTimeout(()=>row.classList.remove("flash"), 200);
  }
  function openPanel(){ panel.classList.add("open"); }
  function shut(){ panel.classList.remove("open"); }
  pill.addEventListener("click", openPanel);
  pill.addEventListener("keydown", e => { if (e.key==="Enter"||e.key===" ") { e.preventDefault(); openPanel(); }});
  closeBtn.addEventListener("click", shut);
  document.querySelectorAll(".sense-row").forEach(r => r.addEventListener("click", () => toggle(r.dataset.sense)));
  window.addEventListener("keydown", e => {
    if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
    const k = e.key.toLowerCase();
    if (k === "e") toggle("eyes");
    else if (k === "a") toggle("ears");
    else if (k === "v") toggle("voice");
    else if (k === "l") toggle("voice_elevenlabs");
    else if (k === "p") panel.classList.toggle("open");
    else if (e.key === "Escape") shut();
  });
  window.__axiomSenses = () => senses;
  render();
})();
</script>
<script>
(function() {
  "use strict";

  // ---------- Constants ----------
  const W = 64, H = 64;
  const SCHEMA_VERSION = 2;

  // Default palette if state isn't embedding one
  const DEFAULT_PALETTE = {
    bg: [10, 10, 15],
    eye: [0, 212, 255],
    pupil: [200, 255, 255],
    mouth: [16, 185, 129],
    tongue: [220, 60, 90],
    listening_accent: [120, 220, 255],
    thinking_accent: [180, 140, 255],
    surprised_accent: [255, 220, 100],
  };

  // ---------- Canvas ----------
  const canvas = document.getElementById("face");
  const ctx = canvas.getContext("2d");
  const label = document.getElementById("label");

  let pxSize = 1, offsetX = 0, offsetY = 0;
  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const sx = Math.floor(canvas.width / W);
    const sy = Math.floor(canvas.height / H);
    pxSize = Math.max(1, Math.min(sx, sy));
    offsetX = Math.floor((canvas.width  - W * pxSize) / 2);
    offsetY = Math.floor((canvas.height - H * pxSize) / 2);
  }
  window.addEventListener("resize", resize);
  resize();

  // ---------- Framebuffer ----------
  // fb[i] = [r, g, b, glow]
  const fb = new Array(W * H);
  for (let i = 0; i < fb.length; i++) fb[i] = [0, 0, 0, 0];

  function clearFB() {
    for (let i = 0; i < fb.length; i++) {
      fb[i][0]=0; fb[i][1]=0; fb[i][2]=0; fb[i][3]=0;
    }
  }

  function setPixel(x, y, r, g, b, glow) {
    if (x < 0 || x >= W || y < 0 || y >= H) return;
    const i = y * W + x;
    const g0 = glow == null ? 1 : glow;
    // Additive mix so overlapping glows brighten
    if (g0 > fb[i][3]) {
      fb[i][0] = r; fb[i][1] = g; fb[i][2] = b; fb[i][3] = g0;
    }
  }

  // ---------- Render ----------
  function render(palette) {
    const bg = palette.bg;
    ctx.fillStyle = `rgb(${bg[0]},${bg[1]},${bg[2]})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const gap = Math.max(1, Math.floor(pxSize * 0.12));
    const cell = pxSize - gap;

    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        const p = fb[y * W + x];
        const sx = offsetX + x * pxSize;
        const sy = offsetY + y * pxSize;

        // Dark cell tint behind everything
        ctx.fillStyle = "rgba(15,15,25,1)";
        ctx.fillRect(sx, sy, cell, cell);

        if (p[3] > 0) {
          const r = p[0], g = p[1], b = p[2], gl = p[3];
          const glowR = Math.floor(pxSize * 0.5);
          if (glowR > 1) {
            const grad = ctx.createRadialGradient(
              sx + cell/2, sy + cell/2, cell * 0.3,
              sx + cell/2, sy + cell/2, cell * 0.5 + glowR
            );
            grad.addColorStop(0, `rgba(${r},${g},${b},${0.35 * gl})`);
            grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
            ctx.fillStyle = grad;
            ctx.fillRect(sx - glowR, sy - glowR, cell + glowR*2, cell + glowR*2);
          }
          ctx.fillStyle = `rgba(${r},${g},${b},${gl})`;
          ctx.fillRect(sx, sy, cell, cell);
          // Bright center highlight
          const hSize = Math.max(1, Math.floor(cell * 0.4));
          const hOff = Math.floor((cell - hSize) / 2);
          ctx.fillStyle = `rgba(${Math.min(255,r+60)},${Math.min(255,g+60)},${Math.min(255,b+60)},${0.4 * gl})`;
          ctx.fillRect(sx + hOff, sy + hOff, hSize, hSize);
        }
      }
    }
  }

  // ---------- Eye & mouth shape builders ----------
  const EYE_LX = 20, EYE_RX = 44, EYE_Y = 22;
  const MOUTH_CX = 32, MOUTH_CY = 48;

  function eyeOpen() {
    const pts = [];
    for (let dy = -3; dy <= 2; dy++)
      for (let dx = -4; dx <= 3; dx++) {
        if (Math.abs(dx) >= 3 && Math.abs(dy) >= 2) continue;
        pts.push([dx, dy]);
      }
    return pts;
  }
  function eyeHalf() {
    const pts = [];
    for (let dy = -1; dy <= 1; dy++)
      for (let dx = -4; dx <= 3; dx++) {
        if (Math.abs(dx) >= 3 && Math.abs(dy) >= 1) continue;
        pts.push([dx, dy]);
      }
    return pts;
  }
  function eyeClosed() {
    const pts = [];
    for (let dx = -3; dx <= 2; dx++) pts.push([dx, 0]);
    return pts;
  }
  function eyeWide() {
    const pts = [];
    for (let dy = -4; dy <= 3; dy++)
      for (let dx = -5; dx <= 4; dx++) {
        if (Math.abs(dx) >= 4 && Math.abs(dy) >= 3) continue;
        pts.push([dx, dy]);
      }
    return pts;
  }
  function eyeSquint() {
    const pts = [];
    for (let dy = 0; dy <= 1; dy++)
      for (let dx = -4; dx <= 3; dx++) pts.push([dx, dy]);
    return pts;
  }
  function pupil(lookX, lookY, big) {
    const pts = [];
    const ox = Math.round(lookX), oy = Math.round(lookY);
    if (big) {
      for (let dy = -1; dy <= 1; dy++)
        for (let dx = -1; dx <= 1; dx++) pts.push([dx + ox, dy + oy]);
    } else {
      for (let dy = -1; dy <= 1; dy++)
        for (let dx = -1; dx <= 0; dx++) pts.push([dx + ox, dy + oy]);
    }
    return pts;
  }

  // Mouth: pts are [dx, dy, alpha]. Mouth shapes 0..3 = closed/slight/open/wide.
  function mouthClosed() {
    const pts = [];
    for (let dx = -5; dx <= 4; dx++) pts.push([dx, 0, 1.0]);
    return pts;
  }
  function mouthSlight() {
    const pts = [];
    for (let dx = -5; dx <= 4; dx++) pts.push([dx, -1, 1.0]);
    pts.push([-5, 0, 0.7]); pts.push([4, 0, 0.7]);
    for (let dx = -5; dx <= 4; dx++) pts.push([dx, 1, 1.0]);
    return pts;
  }
  function mouthOpen() {
    const pts = [];
    for (let dx = -5; dx <= 4; dx++) pts.push([dx, -2, 1.0]);
    for (let dy = -1; dy <= 1; dy++) {
      pts.push([-6, dy, 0.8]); pts.push([5, dy, 0.8]);
      for (let dx = -5; dx <= 4; dx++) pts.push([dx, dy, 0.3]);
    }
    for (let dx = -5; dx <= 4; dx++) pts.push([dx, 2, 1.0]);
    return pts;
  }
  function mouthWide() {
    const pts = [];
    for (let dx = -6; dx <= 5; dx++) pts.push([dx, -3, 1.0]);
    for (let dy = -2; dy <= 2; dy++) {
      pts.push([-7, dy, 0.8]); pts.push([6, dy, 0.8]);
      for (let dx = -6; dx <= 5; dx++) pts.push([dx, dy, 0.25]);
    }
    for (let dx = -6; dx <= 5; dx++) pts.push([dx, 3, 1.0]);
    return pts;
  }
  function mouthO(size) {
    // Circular surprise mouth
    const pts = [];
    const r = size || 3;
    for (let dy = -r; dy <= r; dy++) {
      for (let dx = -r; dx <= r; dx++) {
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d <= r && d >= r - 1) pts.push([dx, dy, 1.0]);
        else if (d < r - 1) pts.push([dx, dy, 0.25]);
      }
    }
    return pts;
  }
  function mouthSmile() {
    // Slight upturned arc (2 rows)
    const pts = [];
    for (let dx = -5; dx <= 4; dx++) pts.push([dx, 0, 1.0]);
    pts.push([-5, -1, 0.7]); pts.push([4, -1, 0.7]);
    return pts;
  }
  function tongueShape() {
    const pts = [];
    for (let dy = 2; dy <= 4; dy++)
      for (let dx = -2; dx <= 1; dx++) pts.push([dx, dy, 1.0]);
    return pts;
  }

  // ---------- Sense-off overlays ----------
  function drawBlindfold(palette) {
    const p = palette.pupil || DEFAULT_PALETTE.pupil;
    const core = [Math.round(p[0]*0.4), Math.round(p[1]*0.4), Math.round(p[2]*0.4)];
    for (let y = 19; y <= 25; y++) {
      const alpha = (y === 19 || y === 25) ? 0.55 : 0.92;
      for (let x = 8; x <= 56; x++) setPixel(x, y, core[0], core[1], core[2], alpha);
    }
    // Knot diamond near right edge
    const knot = [[58,21],[57,22],[58,22],[59,22],[58,23]];
    for (const [x, y] of knot) setPixel(x, y, core[0], core[1], core[2], 0.85);
  }

  function drawEarphones(palette) {
    const eyeC = palette.eye || DEFAULT_PALETTE.eye;
    const rim = palette.listening_accent || eyeC;
    const inner = [Math.round(eyeC[0]*0.5), Math.round(eyeC[1]*0.5), Math.round(eyeC[2]*0.5)];
    function cup(cx, cy) {
      const HW = 3, HH = 5;
      for (let dy = -HH; dy <= HH; dy++) {
        for (let dx = -HW; dx <= HW; dx++) {
          const ex = dx / HW, ey = dy / HH;
          const d = ex*ex + ey*ey;
          if (d > 1.0) continue;
          const onRim = d > 0.55;
          const col = onRim ? rim : inner;
          const a = onRim ? 0.90 : 0.55;
          setPixel(cx + dx, cy + dy, col[0], col[1], col[2], a);
        }
      }
    }
    cup(3, 23);
    cup(60, 23);
  }

  function drawMouthTape(palette) {
    const m = palette.mouth || DEFAULT_PALETTE.mouth;
    const body = [Math.round(m[0]*0.35 + 180*0.65), Math.round(m[1]*0.35 + 180*0.65), Math.round(m[2]*0.35 + 180*0.65)];
    const crease = palette.listening_accent || palette.pupil || [255,255,255];
    for (let y = 46; y <= 50; y++) {
      for (let x = 22; x <= 42; x++) setPixel(x, y, body[0], body[1], body[2], 0.88);
    }
    for (const [x, y] of [[21,47],[21,49],[43,47],[43,49]]) {
      setPixel(x, y, body[0], body[1], body[2], 0.40);
    }
    for (let i = 0; i <= 12; i++) {
      const x = 26 + i;
      const y = 46 + Math.floor(i * 4 / 12);
      setPixel(x, y, crease[0], crease[1], crease[2], 0.55);
    }
  }

  const MOUTH_SHAPES = [mouthClosed(), mouthSlight(), mouthOpen(), mouthWide()];

  // ---------- Zs for sleep ----------
  function drawZs(time, eyeColor) {
    // Three floating Zs, drifting up and right
    const zs = [
      {x: 48, y: 18, size: 6, phase: 0},
      {x: 52, y: 10, size: 5, phase: 0.33},
      {x: 55, y:  4, size: 4, phase: 0.66},
    ];
    zs.forEach(z => {
      const p = ((time * 0.0003) + z.phase) % 1;
      const dy = Math.floor(-p * 16);
      const fade = 1 - p;
      if (fade <= 0) return;
      const y = z.y + dy;
      if (y < -8 || y > 60) return;
      const sz = z.size;
      const [r, g, b] = eyeColor;
      // Z = top line, diagonal, bottom line
      for (let dx = 0; dx <= sz; dx++) setPixel(z.x + dx, y, r, g, b, fade * 0.8);
      for (let i = 0; i <= sz; i++) setPixel(z.x + sz - i, y + i, r, g, b, fade * 0.8);
      for (let dx = 0; dx <= sz; dx++) setPixel(z.x + dx, y + sz, r, g, b, fade * 0.8);
    });
  }

  // ---------- Accent glow halo (outer ring) ----------
  function drawRing(cx, cy, inner, outer, color, alpha) {
    for (let dy = -outer; dy <= outer; dy++) {
      for (let dx = -outer; dx <= outer; dx++) {
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d >= inner && d <= outer) {
          const fade = 1 - Math.min(1, (d - inner) / Math.max(1, (outer - inner)));
          setPixel(cx + dx, cy + dy, color[0], color[1], color[2], alpha * fade);
        }
      }
    }
  }

  // ---------- State ----------
  let state = {
    schema_version: SCHEMA_VERSION,
    mode: "idle",
    mouth: 0,
    mouth_openness: 0,
    look_x: 0,
    look_y: 0,
    eye_state: "open",
    expression: "smile",
    glow: 0.85,
    blink_phase: 0,
    listening_intensity: 0,
    active_word_end_ms: null,
    palette: DEFAULT_PALETTE,
    tick_ms: 0,
  };
  let standalone = true;
  let fetchFails = 0;

  async function pollState() {
    try {
      const resp = await fetch("../face-state.json?" + Date.now());
      if (!resp.ok) throw new Error(resp.status);
      const data = await resp.json();
      state = Object.assign(state, data);
      if (!state.palette || !state.palette.bg) state.palette = DEFAULT_PALETTE;
      standalone = false;
      fetchFails = 0;
    } catch (e) {
      fetchFails++;
      if (fetchFails > 5) {
        standalone = true;
        state.mode = "idle";
        state.palette = DEFAULT_PALETTE;
      }
    }
  }
  setInterval(pollState, 100);
  pollState();

  // Standalone demo animation helpers (used only when no engine is writing state)
  let demoBlinkPhase = 0, demoBlinkTimer = 0, nextBlink = 3500;
  let demoSaccadeX = 0, demoSaccadeY = 0, demoSaccadeTimer = 0, nextSaccade = 1200;
  let demoGazeX = 0, demoGazeY = 0, demoGazeTimer = 0, nextGaze = 5000;
  let demoMouthTimer = 0, nextDemoMouth = 8000, demoMouthBurst = 0, demoMouthVal = 0;
  let demoModeIndex = 0, demoModeTimer = 0;
  const demoModes = ["idle", "attentive", "curious", "surprised", "listening", "thinking", "speaking", "tongue"];

  function randBetween(a, b) { return a + Math.random() * (b - a); }

  function tickStandalone(dt) {
    // Cycle through modes every few seconds to showcase
    demoModeTimer += dt;
    if (demoModeTimer > 5500) {
      demoModeTimer = 0;
      demoModeIndex = (demoModeIndex + 1) % demoModes.length;
      state.mode = demoModes[demoModeIndex];
    }

    // Blink
    demoBlinkTimer += dt;
    if (demoBlinkPhase === 0 && demoBlinkTimer >= nextBlink) { demoBlinkPhase = 1; demoBlinkTimer = 0; }
    else if (demoBlinkPhase === 1 && demoBlinkTimer >= 50) { demoBlinkPhase = 2; demoBlinkTimer = 0; }
    else if (demoBlinkPhase === 2 && demoBlinkTimer >= 80) { demoBlinkPhase = 3; demoBlinkTimer = 0; }
    else if (demoBlinkPhase === 3 && demoBlinkTimer >= 50) {
      demoBlinkPhase = 0; demoBlinkTimer = 0; nextBlink = randBetween(3000, 5000);
    }
    state.blink_phase = demoBlinkPhase;

    // Saccade
    demoSaccadeTimer += dt;
    if (demoSaccadeTimer >= nextSaccade) {
      demoSaccadeX = Math.round(randBetween(-1, 1));
      demoSaccadeY = Math.round(randBetween(-1, 1));
      setTimeout(() => { demoSaccadeX = 0; demoSaccadeY = 0; }, 150);
      demoSaccadeTimer = 0; nextSaccade = randBetween(500, 2000);
    }
    // Gaze drift
    demoGazeTimer += dt;
    if (demoGazeTimer >= nextGaze) {
      demoGazeX = Math.round(randBetween(-2, 2));
      demoGazeY = Math.round(randBetween(-1, 1));
      demoGazeTimer = 0; nextGaze = randBetween(4000, 8000);
    }
    state.look_x = demoGazeX + demoSaccadeX;
    state.look_y = demoGazeY + demoSaccadeY;

    // Demo mouth for speaking
    if (state.mode === "speaking") {
      demoMouthTimer += dt;
      if (demoMouthTimer > 100) {
        demoMouthVal = Math.floor(randBetween(0, 4));
        demoMouthTimer = 0;
      }
      state.mouth = demoMouthVal;
      state.mouth_openness = demoMouthVal / 3.0;
    } else if (state.mode === "tongue") {
      state.mouth = 3;
      state.mouth_openness = 1.0;
    } else {
      state.mouth = 0;
      state.mouth_openness = 0;
    }

    state.glow = 0.85;
    if (state.mode === "listening") state.listening_intensity = 0.5 + 0.5 * Math.sin(performance.now() * 0.006);
  }

  // ---------- Main tick ----------
  let lastTime = performance.now();

  function tick(now) {
    const dt = now - lastTime;
    lastTime = now;

    if (standalone) tickStandalone(dt);

    const palette = state.palette || DEFAULT_PALETTE;
    const mode = state.mode || "idle";

    clearFB();

    // -------- Mode-specific accents --------
    if (mode === "listening") {
      const pulse = 0.3 + 0.5 * Math.max(0, state.listening_intensity || 0.5);
      drawRing(EYE_LX, EYE_Y, 6, 9, palette.listening_accent || palette.eye, pulse * 0.6);
      drawRing(EYE_RX, EYE_Y, 6, 9, palette.listening_accent || palette.eye, pulse * 0.6);
    }
    if (mode === "thinking") {
      // Orbit dot above the head
      const t = now * 0.003;
      const cx = 32, cy = 10;
      for (let i = 0; i < 3; i++) {
        const a = t + i * (Math.PI * 2 / 3);
        const dx = Math.round(Math.cos(a) * 4);
        const dy = Math.round(Math.sin(a) * 2);
        const col = palette.thinking_accent || palette.eye;
        setPixel(cx + dx, cy + dy, col[0], col[1], col[2], 0.8 - i * 0.2);
      }
    }
    if (mode === "surprised") {
      // Spark accents
      const col = palette.surprised_accent || palette.eye;
      setPixel(10, 14, col[0], col[1], col[2], 0.9);
      setPixel(54, 14, col[0], col[1], col[2], 0.9);
      setPixel(8,  22, col[0], col[1], col[2], 0.6);
      setPixel(56, 22, col[0], col[1], col[2], 0.6);
    }

    // -------- Eyes --------
    const isSleep = mode === "sleep";
    let shapeL, shapeR, drawPupil = true;

    const eyeState = state.eye_state || "open";
    if (isSleep) {
      shapeL = eyeClosed(); shapeR = eyeClosed(); drawPupil = false;
    } else if (state.blink_phase === 2) {
      shapeL = eyeClosed(); shapeR = eyeClosed(); drawPupil = false;
    } else if (state.blink_phase === 1 || state.blink_phase === 3) {
      shapeL = eyeHalf(); shapeR = eyeHalf(); drawPupil = false;
    } else if (eyeState === "wide") {
      shapeL = eyeWide(); shapeR = eyeWide();
    } else if (eyeState === "half") {
      shapeL = eyeHalf(); shapeR = eyeHalf();
    } else if (eyeState === "closed") {
      shapeL = eyeClosed(); shapeR = eyeClosed(); drawPupil = false;
    } else if (eyeState === "squint") {
      // Curious — one squinted, one open (asymmetric)
      shapeL = eyeSquint();
      shapeR = eyeOpen();
    } else {
      shapeL = eyeOpen(); shapeR = eyeOpen();
    }

    const eyeCol = palette.eye;
    const eyeGlow = (state.glow || 0.85) * 0.55;
    for (const [dx, dy] of shapeL)
      setPixel(EYE_LX + dx, EYE_Y + dy, eyeCol[0], eyeCol[1], eyeCol[2], eyeGlow);
    for (const [dx, dy] of shapeR)
      setPixel(EYE_RX + dx, EYE_Y + dy, eyeCol[0], eyeCol[1], eyeCol[2], eyeGlow);

    // Pupils — bigger when surprised
    if (drawPupil) {
      const big = (eyeState === "wide");
      const pupilCol = palette.pupil || [255, 255, 255];
      const pupilPts = pupil(state.look_x || 0, state.look_y || 0, big);
      for (const [dx, dy] of pupilPts) {
        setPixel(EYE_LX + dx, EYE_Y + dy, pupilCol[0], pupilCol[1], pupilCol[2], state.glow || 0.85);
        setPixel(EYE_RX + dx, EYE_Y + dy, pupilCol[0], pupilCol[1], pupilCol[2], state.glow || 0.85);
      }
    }

    // -------- Mouth --------
    if (!isSleep) {
      const mc = palette.mouth || DEFAULT_PALETTE.mouth;
      let shape;
      if (mode === "surprised") {
        shape = mouthO(3);
      } else if (mode === "thinking") {
        shape = mouthClosed();
      } else if (mode === "listening") {
        shape = mouthSlight();
      } else if (mode === "curious") {
        shape = mouthSmile();
      } else if (mode === "tongue") {
        shape = mouthOpen();
      } else {
        const idx = Math.min(3, Math.max(0, Math.round(state.mouth || 0)));
        shape = MOUTH_SHAPES[idx];
      }
      const mouthOn = (state.mouth || 0) > 0 || mode === "surprised" || mode === "tongue";
      const baseGlow = (mouthOn ? 0.9 : 0.55) * (state.glow || 0.85);
      for (const pt of shape) {
        const pxGlow = pt.length > 2 ? pt[2] : 1.0;
        setPixel(MOUTH_CX + pt[0], MOUTH_CY + pt[1], mc[0], mc[1], mc[2], baseGlow * pxGlow);
      }
      // Tongue overlay
      if (mode === "tongue") {
        const tc = palette.tongue || DEFAULT_PALETTE.tongue;
        for (const [dx, dy, a] of tongueShape())
          setPixel(MOUTH_CX + dx, MOUTH_CY + dy, tc[0], tc[1], tc[2], a * (state.glow || 0.85));
      }
    }

    // -------- Sleep Z's --------
    if (isSleep) {
      drawZs(now, palette.eye);
    }

    // -------- Sense-off overlays (drawn LAST so they sit on top) --------
    // Prefer authoritative state.senses from face-engine; fall back to local panel state.
    const senses = state.senses || (window.__axiomSenses && window.__axiomSenses()) || null;
    if (senses) {
      if (senses.eyes === false) drawBlindfold(palette);
      if (senses.ears === false) drawEarphones(palette);
      if (senses.voice === false) drawMouthTape(palette);
    }

    render(palette);

    label.textContent = `${state.agent_name || "AXIOM"} · ${mode}` + (standalone ? " · demo" : "");

    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);

})();
</script>
</body>
</html>
