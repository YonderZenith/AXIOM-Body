<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AXIOM Face</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; }
  canvas { display: block; image-rendering: pixelated; }
</style>
</head>
<body>
<canvas id="face"></canvas>
<script>
(function() {
  "use strict";

  // --- Constants ---
  const W = 64, H = 64;
  const BG = [10, 10, 15];
  const EYE_COLOR  = [0, 212, 255];   // cyan
  const MOUTH_COLOR = [16, 185, 129]; // green-cyan

  // --- Canvas setup ---
  const canvas = document.getElementById("face");
  const ctx = canvas.getContext("2d");

  // Each "pixel" = pxSize screen pixels with a 1px gap
  let pxSize = 1, offsetX = 0, offsetY = 0;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const sx = Math.floor(canvas.width / W);
    const sy = Math.floor(canvas.height / H);
    pxSize = Math.max(1, Math.min(sx, sy));
    offsetX = Math.floor((canvas.width  - W * pxSize) / 2);
    offsetY = Math.floor((canvas.height - H * pxSize) / 2);
  }
  window.addEventListener("resize", resize);
  resize();

  // --- Framebuffer: 64x64, each cell [r, g, b, glow(0-1)] ---
  const fb = new Array(W * H);
  for (let i = 0; i < fb.length; i++) fb[i] = [0, 0, 0, 0];

  function clearFB() {
    for (let i = 0; i < fb.length; i++) { fb[i][0]=0; fb[i][1]=0; fb[i][2]=0; fb[i][3]=0; }
  }

  function setPixel(x, y, r, g, b, glow) {
    if (x < 0 || x >= W || y < 0 || y >= H) return;
    const i = y * W + x;
    fb[i][0] = r; fb[i][1] = g; fb[i][2] = b; fb[i][3] = glow || 1;
  }

  function fillRect(x0, y0, w, h, r, g, b, glow) {
    for (let dy = 0; dy < h; dy++)
      for (let dx = 0; dx < w; dx++)
        setPixel(x0 + dx, y0 + dy, r, g, b, glow || 1);
  }

  // --- Render framebuffer to canvas ---
  function render() {
    ctx.fillStyle = "#0a0a0f";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const gap = Math.max(1, Math.floor(pxSize * 0.12));
    const cell = pxSize - gap;

    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        const p = fb[y * W + x];
        const sx = offsetX + x * pxSize;
        const sy = offsetY + y * pxSize;

        // Dark cell background (subtle grid)
        ctx.fillStyle = "rgba(15,15,25,1)";
        ctx.fillRect(sx, sy, cell, cell);

        if (p[3] > 0) {
          const r = p[0], g = p[1], b = p[2], gl = p[3];
          // Glow layer
          const glowR = Math.floor(pxSize * 0.5);
          if (glowR > 1) {
            const grad = ctx.createRadialGradient(
              sx + cell/2, sy + cell/2, cell * 0.3,
              sx + cell/2, sy + cell/2, cell * 0.5 + glowR
            );
            grad.addColorStop(0, `rgba(${r},${g},${b},${0.35 * gl})`);
            grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
            ctx.fillStyle = grad;
            ctx.fillRect(sx - glowR, sy - glowR, cell + glowR*2, cell + glowR*2);
          }
          // Pixel
          ctx.fillStyle = `rgba(${r},${g},${b},${gl})`;
          ctx.fillRect(sx, sy, cell, cell);
          // Bright center highlight
          const hSize = Math.max(1, Math.floor(cell * 0.4));
          const hOff = Math.floor((cell - hSize) / 2);
          ctx.fillStyle = `rgba(${Math.min(255,r+60)},${Math.min(255,g+60)},${Math.min(255,b+60)},${0.4 * gl})`;
          ctx.fillRect(sx + hOff, sy + hOff, hSize, hSize);
        }
      }
    }
  }

  // --- Eye definitions ---
  // Each eye is drawn relative to its center position
  // Eye socket: 8 wide x 6 tall, pupil: 4x4 inside
  const EYE_LX = 20, EYE_RX = 44, EYE_Y = 22;

  // Eye shapes — each is an array of [dx, dy] offsets from center
  function makeEyeOpen() {
    const pts = [];
    // Outer shape: rounded rectangle 8x6
    for (let dy = -3; dy <= 2; dy++) {
      for (let dx = -4; dx <= 3; dx++) {
        // Skip corners for rounded look
        if ((Math.abs(dx) >= 3) && (Math.abs(dy) >= 2)) continue;
        pts.push([dx, dy]);
      }
    }
    return pts;
  }

  function makeEyeHalf() {
    const pts = [];
    for (let dy = -1; dy <= 1; dy++) {
      for (let dx = -4; dx <= 3; dx++) {
        if ((Math.abs(dx) >= 3) && (Math.abs(dy) >= 1)) continue;
        pts.push([dx, dy]);
      }
    }
    return pts;
  }

  function makeEyeClosed() {
    const pts = [];
    for (let dx = -3; dx <= 2; dx++) {
      pts.push([dx, 0]);
    }
    return pts;
  }

  function makePupil(lookX, lookY) {
    // 3x3 pupil, offset by look direction
    const pts = [];
    const ox = Math.round(lookX);
    const oy = Math.round(lookY);
    for (let dy = -1; dy <= 1; dy++) {
      for (let dx = -1; dx <= 0; dx++) {
        pts.push([dx + ox, dy + oy]);
      }
    }
    return pts;
  }

  // Mouth shapes: centered at (32, 48), varying heights
  // Mouths use outline style for closed/slight, filled for open/wide
  function makeMouthClosed() {
    // Simple horizontal line — resting face
    const pts = [];
    for (let dx = -5; dx <= 4; dx++) {
      pts.push([dx, 0, 1.0]);
    }
    return pts;
  }

  function makeMouthSlight() {
    // Rounded opening, 2px tall
    const pts = [];
    // Top edge
    for (let dx = -5; dx <= 4; dx++) pts.push([dx, -1, 1.0]);
    // Sides
    pts.push([-5, 0, 0.7]); pts.push([4, 0, 0.7]);
    // Bottom edge
    for (let dx = -5; dx <= 4; dx++) pts.push([dx, 1, 1.0]);
    return pts;
  }

  function makeMouthOpen() {
    // Oval opening, filled interior dimmer
    const pts = [];
    // Top edge
    for (let dx = -5; dx <= 4; dx++) pts.push([dx, -2, 1.0]);
    // Sides + dim interior
    for (let dy = -1; dy <= 1; dy++) {
      pts.push([-6, dy, 0.8]);
      pts.push([5, dy, 0.8]);
      for (let dx = -5; dx <= 4; dx++) pts.push([dx, dy, 0.3]);
    }
    // Bottom edge
    for (let dx = -5; dx <= 4; dx++) pts.push([dx, 2, 1.0]);
    return pts;
  }

  function makeMouthWide() {
    // Large oval, filled interior dimmer
    const pts = [];
    // Top
    for (let dx = -6; dx <= 5; dx++) pts.push([dx, -3, 1.0]);
    // Upper sides + interior
    for (let dy = -2; dy <= 2; dy++) {
      pts.push([-7, dy, 0.8]);
      pts.push([6, dy, 0.8]);
      for (let dx = -6; dx <= 5; dx++) pts.push([dx, dy, 0.25]);
    }
    // Bottom
    for (let dx = -6; dx <= 5; dx++) pts.push([dx, 3, 1.0]);
    return pts;
  }

  const MOUTH_SHAPES = [makeMouthClosed(), makeMouthSlight(), makeMouthOpen(), makeMouthWide()];
  const MOUTH_CX = 32, MOUTH_CY = 48;

  // --- Animation state ---
  let state = {
    mode: "idle",     // idle, speaking, sleep
    mouth: 0,         // 0-3
    look_x: 0,        // -3 to 3
    look_y: 0         // -2 to 2
  };

  let standalone = true; // true = demo mode (no face-state.json)
  let blinkPhase = 0;    // 0=open, 1=closing, 2=closed, 3=opening
  let blinkTimer = 0;
  let nextBlink = randomBetween(3000, 5000);
  let saccadeX = 0, saccadeY = 0;
  let saccadeTimer = 0;
  let nextSaccade = randomBetween(500, 2000);
  let gazeX = 0, gazeY = 0;
  let gazeTimer = 0;
  let nextGaze = randomBetween(4000, 8000);
  let demoMouthTimer = 0;
  let nextDemoMouth = randomBetween(6000, 12000);
  let demoMouthPhase = 0;
  let demoMouthCount = 0;

  // Breathing / subtle life pulse
  let breathPhase = 0;

  function randomBetween(a, b) { return a + Math.random() * (b - a); }

  // --- Polling face-state.json ---
  let pollInterval = null;
  let fetchFails = 0;

  async function pollState() {
    try {
      const resp = await fetch("face-state.json?" + Date.now());
      if (!resp.ok) throw new Error(resp.status);
      const data = await resp.json();
      state.mode = data.mode || "idle";
      state.mouth = Math.max(0, Math.min(3, data.mouth || 0));
      state.look_x = Math.max(-3, Math.min(3, data.look_x || 0));
      state.look_y = Math.max(-2, Math.min(2, data.look_y || 0));
      standalone = false;
      fetchFails = 0;
    } catch (e) {
      fetchFails++;
      if (fetchFails > 5) {
        standalone = true;
        state.mode = "idle";
      }
    }
  }

  pollInterval = setInterval(pollState, 100);
  pollState(); // initial attempt

  // --- Main loop ---
  let lastTime = performance.now();

  function tick(now) {
    const dt = now - lastTime;
    lastTime = now;

    clearFB();

    const mode = standalone ? "idle" : state.mode;
    const effectiveLookX = standalone ? gazeX + saccadeX : state.look_x + saccadeX;
    const effectiveLookY = standalone ? gazeY + saccadeY : state.look_y + saccadeY;

    // --- Update blink ---
    blinkTimer += dt;
    if (blinkPhase === 0 && blinkTimer >= nextBlink) {
      blinkPhase = 1;
      blinkTimer = 0;
    } else if (blinkPhase === 1 && blinkTimer >= 50) {
      blinkPhase = 2;
      blinkTimer = 0;
    } else if (blinkPhase === 2 && blinkTimer >= 80) {
      blinkPhase = 3;
      blinkTimer = 0;
    } else if (blinkPhase === 3 && blinkTimer >= 50) {
      blinkPhase = 0;
      blinkTimer = 0;
      nextBlink = randomBetween(3000, 5000);
    }

    // --- Update saccades ---
    saccadeTimer += dt;
    if (saccadeTimer >= nextSaccade) {
      saccadeX = Math.round(randomBetween(-1, 1));
      saccadeY = Math.round(randomBetween(-1, 1));
      // Reset saccade after short hold
      setTimeout(() => { saccadeX = 0; saccadeY = 0; }, 150);
      saccadeTimer = 0;
      nextSaccade = randomBetween(500, 2000);
    }

    // --- Update gaze (standalone only) ---
    if (standalone) {
      gazeTimer += dt;
      if (gazeTimer >= nextGaze) {
        gazeX = Math.round(randomBetween(-2, 2));
        gazeY = Math.round(randomBetween(-1, 1));
        gazeTimer = 0;
        nextGaze = randomBetween(4000, 8000);
      }
    }

    // --- Demo mouth ---
    let mouthVal = state.mouth;
    if (standalone) {
      demoMouthTimer += dt;
      if (demoMouthPhase === 0 && demoMouthTimer >= nextDemoMouth) {
        // Start a "speaking" burst
        demoMouthPhase = 1;
        demoMouthCount = Math.floor(randomBetween(6, 18));
        demoMouthTimer = 0;
      } else if (demoMouthPhase === 1) {
        if (demoMouthTimer >= 120) {
          mouthVal = Math.floor(randomBetween(0, 4));
          demoMouthCount--;
          demoMouthTimer = 0;
          if (demoMouthCount <= 0) {
            demoMouthPhase = 0;
            mouthVal = 0;
            nextDemoMouth = randomBetween(6000, 12000);
          }
        } else {
          mouthVal = Math.floor(randomBetween(0, 4));
        }
      }
    }

    // --- Breathing ---
    breathPhase += dt * 0.001;
    const breathGlow = 0.85 + 0.15 * Math.sin(breathPhase * 1.2);

    // --- Draw eyes ---
    const isSleep = mode === "sleep";
    let eyeShape, drawPupil = true;

    if (isSleep) {
      eyeShape = makeEyeClosed();
      drawPupil = false;
    } else if (blinkPhase === 1 || blinkPhase === 3) {
      eyeShape = makeEyeHalf();
      drawPupil = false;
    } else if (blinkPhase === 2) {
      eyeShape = makeEyeClosed();
      drawPupil = false;
    } else {
      eyeShape = makeEyeOpen();
    }

    const ec = EYE_COLOR;
    // Left eye
    for (const [dx, dy] of eyeShape) {
      setPixel(EYE_LX + dx, EYE_Y + dy, ec[0], ec[1], ec[2], breathGlow * 0.55);
    }
    // Right eye
    for (const [dx, dy] of eyeShape) {
      setPixel(EYE_RX + dx, EYE_Y + dy, ec[0], ec[1], ec[2], breathGlow * 0.55);
    }

    // Pupils (brighter center)
    if (drawPupil) {
      const pupil = makePupil(effectiveLookX, effectiveLookY);
      for (const [dx, dy] of pupil) {
        setPixel(EYE_LX + dx, EYE_Y + dy, 200, 255, 255, breathGlow);
        setPixel(EYE_RX + dx, EYE_Y + dy, 200, 255, 255, breathGlow);
      }
    }

    // --- Draw mouth ---
    if (!isSleep) {
      const mc = MOUTH_COLOR;
      const shape = MOUTH_SHAPES[Math.min(3, Math.max(0, mouthVal))];
      const baseGlow = mouthVal > 0 ? breathGlow * 0.9 : breathGlow * 0.5;
      for (const pt of shape) {
        const pxGlow = pt.length > 2 ? pt[2] : 1.0;
        setPixel(MOUTH_CX + pt[0], MOUTH_CY + pt[1], mc[0], mc[1], mc[2], baseGlow * pxGlow);
      }
    }

    // --- Render ---
    render();
    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);

})();
</script>
</body>
</html>
